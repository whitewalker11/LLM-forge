<!DOCTYPE html>
<html>

<head>
    <title>LLM Platform</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: #111827;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            border-right: 1px solid #1f2937;
        }

        .sidebar h2 {
            margin: 0;
            font-size: 18px;
        }

        select,
        button,
        input[type="file"] {
            padding: 8px;
            border-radius: 6px;
            border: none;
            background: #1f2937;
            color: white;
        }

        button {
            cursor: pointer;
            background: #2563eb;
        }

        button:hover {
            background: #1d4ed8;
        }

        /* Chat Area */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .message {
            max-width: 70%;
            margin-bottom: 12px;
            padding: 10px 14px;
            border-radius: 12px;
            line-height: 1.4;
        }

        .user {
            background: #2563eb;
            align-self: flex-end;
        }

        .bot {
            background: #1f2937;
            align-self: flex-start;
        }

        .input-area {
            display: flex;
            padding: 15px;
            border-top: 1px solid #1f2937;
        }

        textarea {
            flex: 1;
            resize: none;
            border-radius: 8px;
            border: none;
            padding: 10px;
            background: #1f2937;
            color: white;
        }

        .send-btn {
            margin-left: 10px;
            background: #10b981;
        }

        .loader {
            font-size: 12px;
            opacity: 0.6;
            margin-top: 5px;
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <h2>LLM Platform</h2>

        <label>Model</label>
        <select id="model">
            <option value="tiny">TinyLlama</option>
            <option value="phi">Phi-3 Mini</option>
            <option value="qwen">Qwen 2.5 3B</option>
            <option value="mistral">Mistral 7B</option>
            <option value="gemma">Gemma 2B</option>
        </select>

        <label>
            <input type="checkbox" id="ragToggle"> Enable RAG
        </label>

        <input type="file" id="fileInput">
        <button onclick="uploadFile()">Upload Document</button>
    </div>

    <div class="chat-container">
        <div class="chat-box" id="chatBox"></div>

        <div class="input-area">
            <textarea id="message" rows="2" placeholder="Type your message..."></textarea>
            <button class="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>

        const API_URL = "http://localhost:8000";

        function addMessage(text, type) {
            const chatBox = document.getElementById("chatBox");

            const div = document.createElement("div");
            div.className = "message " + type;
            div.innerText = text;

            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function uploadFile() {

            const file = document.getElementById("fileInput").files[0];
            if (!file) return alert("Select file first");

            const formData = new FormData();
            formData.append("file", file);

            await fetch(API_URL + "/upload", {
                method: "POST",
                body: formData
            });

            alert("Document indexed successfully!");
        }

        async function sendMessage() {

            const textarea = document.getElementById("message");
            const msg = textarea.value.trim();
            if (!msg) return;

            const model = document.getElementById("model").value;
            const useRag = document.getElementById("ragToggle").checked;

            addMessage(msg, "user");
            textarea.value = "";

            const loader = document.createElement("div");
            loader.className = "loader";
            loader.innerText = "Thinking...";
            document.getElementById("chatBox").appendChild(loader);

            const response = await fetch(API_URL + "/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    model_name: model,
                    message: msg,
                    use_rag: useRag
                })
            });

            const data = await response.json();

            loader.remove();
            addMessage(data.response, "bot");
        }

    </script>

</body>

</html>
