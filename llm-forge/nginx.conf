server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri /index.html;
    }

    location /chat {
        proxy_pass http://host.docker.internal:8000;
    }

    location /upload {
        proxy_pass http://host.docker.internal:8000;
    }
}